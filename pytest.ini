[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
markers =
    slow: 需要更多时间的测试（跳过用 pytest -m "not slow"）
    integration: 需要真实 LLM/网络的集成测试
    parallel: 可并行执行的测试
