<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CollabRoom</title>
<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --card: #16213e;
    --border: #2a2a4a;
    --text: #e0e0e0;
    --text-dim: #6b6b8a;
    --accent: #e94560;
    --architect: #e94560;
    --developer: #4ecca3;
    --tester: #ffd369;
    --user-color: #8b8ba7;
  }
  body {
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
  }
  header h1 span { color: var(--text); font-weight: 400; }
  header .status {
    font-size: 13px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  header .status .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #4ecca3;
    display: inline-block;
  }

  /* ── Layout ── */
  .container {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 200px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 16px;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .sidebar h2 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }
  .member {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    margin-bottom: 4px;
    cursor: default;
    transition: background 0.15s;
  }
  .member:hover { background: rgba(255,255,255,0.04); }
  .member .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    flex-shrink: 0;
  }
  .member .info { min-width: 0; }
  .member .info .name {
    font-size: 14px;
    font-weight: 500;
  }
  .member .info .role {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .member .online-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    margin-left: auto;
    flex-shrink: 0;
  }
  .member .online-dot.online { background: #4ecca3; }

  /* ── Main Chat Area ── */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar {
    width: 6px;
  }
  #messages::-webkit-scrollbar-track {
    background: transparent;
  }
  #messages::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }

  /* ── Messages ── */
  .msg {
    margin-bottom: 10px;
    max-width: 80%;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.user { margin-left: auto; }
  .msg.agent { margin-right: auto; }

  .msg .bubble {
    padding: 10px 14px;
    border-radius: 12px;
    line-height: 1.5;
    font-size: 14px;
    word-wrap: break-word;
    white-space: pre-wrap;
  }
  .msg.user .bubble {
    background: #0f3460;
    border-bottom-right-radius: 4px;
  }
  .msg.agent .bubble {
    background: var(--card);
    border-left: 3px solid var(--accent);
    border-bottom-left-radius: 4px;
  }
  .msg.agent.architect .bubble { border-left-color: var(--architect); }
  .msg.agent.developer .bubble { border-left-color: var(--developer); }
  .msg.agent.tester .bubble { border-left-color: var(--tester); }

  .msg .meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
    font-size: 12px;
  }
  .msg.user .meta { justify-content: flex-end; }
  .msg .meta .sender-name {
    font-weight: 600;
    font-size: 13px;
  }
  .msg.user .meta .sender-name { color: var(--user-color); }
  .msg.agent .meta .sender-name.architect { color: var(--architect); }
  .msg.agent .meta .sender-name.developer { color: var(--developer); }
  .msg.agent .meta .sender-name.tester { color: var(--tester); }

  .msg .meta .time {
    color: var(--text-dim);
    font-size: 11px;
  }
  .msg .meta .badge {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 4px;
    background: rgba(255,255,255,0.06);
    color: var(--text-dim);
  }
  .msg .meta .badge.public { color: #4ecca3; border: 1px solid rgba(78,204,163,0.3); }
  .msg .meta .badge.dm { color: #ffd369; border: 1px solid rgba(255,211,105,0.3); }

  /* ── System Messages ── */
  .msg.system {
    text-align: center;
    max-width: 100%;
  }
  .msg.system .bubble {
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    padding: 4px 12px;
    border: none;
  }
  .msg.pass .bubble {
    background: rgba(255,255,255,0.03);
    color: var(--text-dim);
    font-size: 13px;
    font-style: italic;
  }

  /* ── Loading ── */
  .loading {
    text-align: center;
    padding: 16px;
    color: var(--text-dim);
    font-size: 14px;
    animation: pulse 1.5s ease infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }
  .loading .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Input Area ── */
  .input-area {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .input-row {
    display: flex;
    gap: 8px;
    position: relative;
  }
  .input-wrapper {
    flex: 1;
    position: relative;
  }
  .input-wrapper input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-wrapper input:focus {
    border-color: var(--accent);
  }
  .input-wrapper input::placeholder {
    color: var(--text-dim);
  }

  .input-area button {
    padding: 12px 24px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: white;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .input-area button:hover { background: #c73e54; }
  .input-area button:active { transform: scale(0.97); }
  .input-area button:disabled {
    background: var(--border);
    color: var(--text-dim);
    cursor: not-allowed;
  }

  /* ── @mention Dropdown ── */
  .mention-dropdown {
    position: absolute;
    bottom: 100%;
    left: 0;
    right: 0;
    margin-bottom: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    overflow: hidden;
    display: none;
    z-index: 100;
  }
  .mention-dropdown.visible { display: block; }
  .mention-item {
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.1s;
  }
  .mention-item:hover,
  .mention-item.active {
    background: rgba(233,69,96,0.12);
  }
  .mention-item .color-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .mention-item .mention-name {
    font-weight: 500;
  }
  .mention-item .mention-role {
    color: var(--text-dim);
    font-size: 12px;
    margin-left: auto;
  }

  /* ── Disconnect Banner ── */
  .disconnected {
    display: none;
    background: rgba(233,69,96,0.12);
    color: var(--accent);
    text-align: center;
    padding: 8px;
    font-size: 13px;
    border-bottom: 1px solid rgba(233,69,96,0.3);
  }
  .disconnected.show { display: block; }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .sidebar { display: none; }
    .msg { max-width: 90%; }
    .input-area { padding: 10px; }
  }

  /* ── Inline code styling in message content ── */
  .bubble code {
    background: rgba(255,255,255,0.06);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 13px;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .bubble pre {
    background: rgba(0,0,0,0.3);
    padding: 10px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 8px 0;
    font-size: 13px;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
</style>
</head>
<body>

<header>
  <h1>🏠 CollabRoom <span>Chat</span></h1>
  <div class="status">
    <span class="dot"></span>
    <span id="memberCount">0</span> 人在线
  </div>
</header>

<div class="disconnected" id="disconnectBanner">
  ⚠️ 连接丢失，正在重试…
</div>

<div class="container">
  <aside class="sidebar" id="sidebar">
    <h2>成员</h2>
    <div id="memberList"></div>
  </aside>

  <main class="chat-area">
    <div id="messages"></div>

    <div class="input-area">
      <div class="input-row">
        <div class="input-wrapper">
          <div class="mention-dropdown" id="mentionDropdown"></div>
          <input id="input" type="text" placeholder="输入消息… @ 艾特成员" autofocus>
        </div>
        <button id="sendBtn">发送</button>
      </div>
    </div>
  </main>
</div>

<script>
// ── State ──
const MEMBER_COLORS = {
  '架构师': '#e94560',
  '开发者': '#4ecca3',
  '测试': '#ffd369',
};

let members = [];
let mentionStart = -1;   // index of '@' in input
let mentionFilter = '';  // text typed after @
let activeIdx = 0;

const msgContainer = document.getElementById('messages');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const memberList = document.getElementById('memberList');
const mentionDropdown = document.getElementById('mentionDropdown');
const disconnectBanner = document.getElementById('disconnectBanner');
const memberCount = document.getElementById('memberCount');

// ── Load History on Start ──
async function loadHistory() {
  try {
    const res = await fetch('/history');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    msgContainer.innerHTML = '';
    data.forEach(m => renderMessage(m));
    scrollBottom();
  } catch (e) {
    console.warn('loadHistory:', e);
  }
}

// ── Load Members ──
async function loadMembers() {
  try {
    const res = await fetch('/members');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    members = await res.json();
    renderSidebar();
    memberCount.textContent = members.length;
  } catch (e) {
    console.warn('loadMembers:', e);
  }
}

function renderSidebar() {
  memberList.innerHTML = members.map(m => {
    const initial = m.name.charAt(0);
    const color = MEMBER_COLORS[m.name] || '#8b8ba7';
    const cssName = m.name.toLowerCase();
    return `<div class="member">
      <div class="avatar" style="background:${color}22; color:${color}">${initial}</div>
      <div class="info">
        <div class="name" style="color:${color}">${escapeHtml(m.name)}</div>
        <div class="role">${escapeHtml(m.role.slice(0, 50))}</div>
      </div>
      <div class="online-dot online"></div>
    </div>`;
  }).join('');
}

// ── Render a single message ──
function renderMessage(m) {
  const div = document.createElement('div');

  const sender = m.sender || 'system';
  const content = m.content || '';
  const kind = m.kind || 'public';
  const ts = m.timestamp ? new Date(m.timestamp * 1000) : new Date();
  const timeStr = ts.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

  const lowerSender = sender.toLowerCase();

  // System / empty messages
  if (sender === 'system' || sender === 'user') {
    if (content === 'PASS') {
      div.className = 'msg pass';
      div.innerHTML = `<div class="bubble">🙊 ${/* sender doesn't matter */''}PASS</div>`;
    } else if (sender === 'system') {
      div.className = 'msg system';
      div.innerHTML = `<div class="bubble">${escapeHtml(content)}</div>`;
    } else {
      div.className = 'msg user';
      div.innerHTML = `<div class="meta">
        <span class="time">${timeStr}</span>
      </div><div class="bubble">${formatContent(content)}</div>`;
    }
    msgContainer.appendChild(div);
    return;
  }

  // Agent message
  const color = MEMBER_COLORS[sender] || '#8b8ba7';
  const nameClass = lowerSender.toLowerCase();

  div.className = `msg agent ${nameClass}`;
  div.innerHTML = `<div class="meta">
    <span class="sender-name ${nameClass}" style="color:${color}">${escapeHtml(sender)}</span>
    <span class="badge ${kind}">${kind === 'dm' ? '📩 DM' : '💬 公开'}</span>
    <span class="time">${timeStr}</span>
  </div><div class="bubble">${formatContent(content)}</div>`;

  msgContainer.appendChild(div);
}

function formatContent(text) {
  if (!text) return '';
  let html = escapeHtml(text);
  // Simple inline code: `code`
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold: **text**
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // @mentions in messages → highlight
  html = html.replace(/@(\S+)/g, (match, name) => {
    const color = MEMBER_COLORS[name] || '#8b8ba7';
    return `<span style="color:${color}; font-weight:600">@${escapeHtml(name)}</span>`;
  });
  // Line breaks
  html = html.replace(/\n/g, '<br>');
  return html;
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function scrollBottom() {
  msgContainer.scrollTop = msgContainer.scrollHeight;
}

// ── Send Message ──
async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  closeMention();
  sendBtn.disabled = true;

  // Show user message immediately
  renderMessage({ sender: 'user', content: text, kind: 'public', timestamp: Math.floor(Date.now() / 1000) });
  scrollBottom();

  // Show spinner
  const spinner = document.createElement('div');
  spinner.className = 'loading';
  spinner.innerHTML = '<span class="spinner"></span>Agent 们正在思考…';
  msgContainer.appendChild(spinner);
  scrollBottom();

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });

    spinner.remove();

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      renderMessage({ sender: 'system', content: `❌ ${res.status}: ${err.error || '请求失败'}`, kind: 'public', timestamp: Math.floor(Date.now() / 1000) });
      scrollBottom();
      return;
    }

    const data = await res.json();
    if (data.responses && data.responses.length > 0) {
      data.responses.forEach(r => renderMessage(r));
    } else {
      renderMessage({ sender: 'system', content: '(没有 Agent 回应)', kind: 'public', timestamp: Math.floor(Date.now() / 1000) });
    }
    scrollBottom();
  } catch (e) {
    spinner.remove();
    renderMessage({ sender: 'system', content: `❌ 网络错误: ${e.message}`, kind: 'public', timestamp: Math.floor(Date.now() / 1000) });
    disconnectBanner.classList.add('show');
    setTimeout(() => disconnectBanner.classList.remove('show'), 5000);
    scrollBottom();
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

// ── @mention Logic ──
function getCursorPos() {
  return input.selectionStart || 0;
}

function findMentionTrigger() {
  const pos = getCursorPos();
  const text = input.value.slice(0, pos);
  // Find the last @ that's at a word boundary
  const match = text.match(/(?:^|\s)@([\w\u4e00-\u9fff]*)$/);
  if (match) {
    mentionStart = match.index + (text[match.index] === '@' ? 0 : text.slice(0, match.index).lastIndexOf(' ') + 1);
    mentionFilter = match[1];
    return true;
  }
  mentionStart = -1;
  mentionFilter = '';
  return false;
}

function openMention() {
  const filtered = members.filter(m =>
    m.name.toLowerCase().includes(mentionFilter.toLowerCase())
  );
  if (filtered.length === 0) {
    mentionDropdown.classList.remove('visible');
    return;
  }

  activeIdx = 0;
  mentionDropdown.innerHTML = filtered.map((m, i) => {
    const color = MEMBER_COLORS[m.name] || '#8b8ba7';
    return `<div class="mention-item${i === 0 ? ' active' : ''}" data-index="${i}" data-name="${escapeHtml(m.name)}">
      <span class="color-dot" style="background:${color}"></span>
      <span class="mention-name">@${escapeHtml(m.name)}</span>
      <span class="mention-role">${escapeHtml(m.role.slice(0, 30))}</span>
    </div>`;
  }).join('');
  mentionDropdown.classList.add('visible');
}

function closeMention() {
  mentionDropdown.classList.remove('visible');
}

function selectMention(name) {
  const before = input.value.slice(0, mentionStart);
  const after = input.value.slice(getCursorPos());
  input.value = before + '@' + name + ' ' + after;
  const newPos = before.length + name.length + 2;
  input.setSelectionRange(newPos, newPos);
  closeMention();
  input.focus();
}

// ── Input Event Listeners ──
input.addEventListener('input', () => {
  if (findMentionTrigger()) {
    openMention();
  } else {
    closeMention();
  }
});

input.addEventListener('keydown', (e) => {
  if (!mentionDropdown.classList.contains('visible')) {
    if (e.key === 'Enter') {
      e.preventDefault();
      sendMessage();
    }
    return;
  }

  const items = mentionDropdown.querySelectorAll('.mention-item');
  if (items.length === 0) { closeMention(); return; }

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    activeIdx = (activeIdx + 1) % items.length;
    items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    activeIdx = (activeIdx - 1 + items.length) % items.length;
    items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
  } else if (e.key === 'Enter' || e.key === 'Tab') {
    e.preventDefault();
    const active = items[activeIdx];
    if (active) selectMention(active.dataset.name);
  } else if (e.key === 'Escape') {
    closeMention();
  }
});

// Click on mention item
mentionDropdown.addEventListener('mousedown', (e) => {
  const item = e.target.closest('.mention-item');
  if (item) {
    e.preventDefault();
    selectMention(item.dataset.name);
  }
});

// Click outside closes mention
document.addEventListener('click', (e) => {
  if (!e.target.closest('.input-wrapper')) {
    closeMention();
  }
});

// Send button
sendBtn.addEventListener('click', sendMessage);

// Ctrl+Enter also sends (instead of newline in this simple input; we don't have multi-line yet)
// Focus input on load
input.focus();

// ── Polling: auto-refresh history every 30s ──
// (In case of external changes, but mainly we do optimistic rendering)
let lastMsgCount = 0;
setInterval(async () => {
  try {
    const res = await fetch('/history?tail=1');
    if (!res.ok) return;
    const data = await res.json();
    const msgEls = msgContainer.querySelectorAll('.msg:not(.msg.system):not(.loading)');
    if (data.length > msgEls.length) {
      // New messages arrived from elsewhere — reload
      loadHistory();
    }
  } catch (_) {}
}, 30000);

// ── Init ──
loadMembers();
loadHistory();
</script>
</body>
</html>
